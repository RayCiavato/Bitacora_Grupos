services:
  postgres:
    image: postgres:16-alpine
    container_name: bitacora-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - bitacora_net
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: bitacora-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-bitacora-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-bitacora-clients}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-bitacora_access}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-bitacora_refresh}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-strict}
      ADMIN_DEFAULT_NAME: ${ADMIN_DEFAULT_NAME:-Administrador}
      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL:-admin@bitacora.local}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      MAX_FAILED_ATTEMPTS: ${MAX_FAILED_ATTEMPTS:-5}
      LOCK_MINUTES: ${LOCK_MINUTES:-15}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      MFA_REQUIRED: ${MFA_REQUIRED:-false}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-true}
      UPLOAD_DIR: ${UPLOAD_DIR:-/usr/src/app/uploads}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10485760}
      REMINDER_ENABLED: ${REMINDER_ENABLED:-false}
      REMINDER_CRON: ${REMINDER_CRON:-0 17 * * 1-5}
      REMINDER_TIMEZONE: ${REMINDER_TIMEZONE:-America/Bogota}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/usr/src/app/uploads
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - bitacora_net
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: bitacora-caddy
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - bitacora_net
    restart: unless-stopped

  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: bitacora-backup
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 14
      BACKUP_KEEP_WEEKS: 8
      BACKUP_KEEP_MONTHS: 12
      HEALTHCHECK_PORT: 8080
      POSTGRES_EXTRA_OPTS: -Z9 --schema=public --blobs
    volumes:
      - ./backups:/backups
    networks:
      - bitacora_net
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: bitacora-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres
    networks:
      - bitacora_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: bitacora-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - app
      - node-exporter
      - alertmanager
      - postgres-exporter
    networks:
      - bitacora_net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: bitacora-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - bitacora_net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: bitacora-loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - bitacora_net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    container_name: bitacora-promtail
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - bitacora_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: bitacora-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - bitacora_net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: bitacora-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - bitacora_net
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:
  uploads_data:

networks:
  bitacora_net:
    driver: bridge
