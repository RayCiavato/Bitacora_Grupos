<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitacora - Vista completa</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/report-view.css" />
  </head>
  <body>
    <main class="report-shell">
      <section class="card report-header">
        <div>
          <p class="eyebrow">VISTA COMPLETA</p>
          <h2>Consulta ampliada de bitacora</h2>
          <p id="summary" class="subtitle"></p>
        </div>
        <div class="report-actions">
          <button id="prevBtn" type="button" class="btn btn-ghost">Anterior</button>
          <button id="nextBtn" type="button" class="btn btn-ghost">Siguiente</button>
          <button id="closeBtn" type="button" class="btn btn-secondary">Cerrar</button>
        </div>
      </section>

      <section class="card">
        <div class="table-wrap report-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Encargado</th>
                <th>Actividad</th>
                <th>Observacion</th>
                <th>Prioridad</th>
                <th>Plantilla</th>
                <th>Adjuntos</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/security.js" defer></script>
    <script src="/report-view.js?asset=report" defer></script>
  </body>
</html>
